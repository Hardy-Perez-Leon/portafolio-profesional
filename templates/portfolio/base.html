{% load static %}
<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta
      name="description"
      content="Portafolio profesional de Hardy Pérez León, Bioquímico y Desarrollador Full Stack Python en formación."
    />

    <title>
      {% block title %}Portafolio Profesional | Hardy Pérez León{% endblock %}
    </title>

    <!-- Tipografía -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Bootstrap Icons -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />

    <!-- CSS propio -->
    <link rel="stylesheet" href="{% static 'css/styles.css' %}" />
  </head>

  <body>
    <header>
      <nav
        class="navbar navbar-expand-lg navbar-dark fixed-top navbar-custom"
        aria-label="Navegación principal"
      >
        <div class="container">
          <a class="navbar-brand" href="#inicio" aria-label="Ir al inicio">
            <span class="marca-icono">HP</span>

            <span class="marca-texto"> Hardy <strong>Pérez León</strong> </span>
          </a>

          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#menuPrincipal"
            aria-controls="menuPrincipal"
            aria-expanded="false"
            aria-label="Abrir menú"
          >
            <span class="navbar-toggler-icon"></span>
          </button>

          <div class="collapse navbar-collapse" id="menuPrincipal">
            <ul class="navbar-nav ms-auto align-items-lg-center">
              <li class="nav-item">
                <a class="nav-link active" href="#inicio">Inicio</a>
              </li>

              <li class="nav-item">
                <a class="nav-link" href="#experiencia">Experiencia</a>
              </li>

              <li class="nav-item">
                <a class="nav-link" href="#formacion">Formación</a>
              </li>

              <li class="nav-item">
                <a class="nav-link" href="#proyectos">Proyectos</a>
              </li>

              <li class="nav-item">
                <a class="nav-link" href="#cv">CV</a>
              </li>

              <li class="nav-item">
                <a class="nav-link" href="#contacto">Contacto</a>
              </li>
            </ul>
          </div>
        </div>
      </nav>
    </header>

    <main>{% block content %} {% endblock %}</main>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- JavaScript propio -->
    <script src="{% static 'js/main.js' %}"></script>
  </body>
</html>
